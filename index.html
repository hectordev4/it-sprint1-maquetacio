<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viatges Pastanaga</title>
    <link rel="stylesheet" href="src/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <header>
      <img src="./src/assets/icons/logo+name.png" alt="logo and name from viatges pastanaga">
    </header>

    <div class="navibar">
      <a href="#">Home</a>
      <a href="#">Viatges</a>
      <a href="#">Agenda</a>
      <a href="#">Login</a>
    </div>
    
    <main class="travel-body">
      <section class="hero">
        <div class="hero-content">
          <h1>The World Is Yours To Explore</h1>
          <p>Premium flights to over 150 destinations worldwide.</p>
          
          <div class="booking-bar">
            <input type="text" placeholder="From where?">
            <input type="text" placeholder="To where?">
            <input type="date">
            <button class="btn-search">Search Flights</button>
          </div>
        </div>
      </section>

      <section class="destinations">
        <h2>Popular Destinations</h2>
        <div class="dest-grid">
          <div class="dest-card">
            <div class="image-placeholder-tokyo">Tokyo</div>
            <h3>Tokyo, Japan</h3>
            <p>Starting from 899€</p>
          </div>
          <div class="dest-card">
            <div class="image-placeholder-paris">Paris</div>
            <h3>Paris, France</h3>
            <p>Starting from 650€</p>
          </div>
          <div class="dest-card">
            <div class="image-placeholder-maldives">Maldives</div>
            <h3>The Maldives</h3>
            <p>Starting from 1,200€</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
